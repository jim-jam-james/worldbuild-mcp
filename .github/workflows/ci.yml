# CI — runs the same checks you run locally, on every push and PR.
# Lives at .github/workflows/ci.yml; GitHub discovers it automatically.
name: CI

# WHEN this workflow runs:
on:
  push:
    branches: [main]   # every push to main
  pull_request:        # every PR (against any branch)

jobs:
  test:
    runs-on: ubuntu-latest   # a fresh Linux VM, provisioned per run

    steps:
      # 1. Clone your repo into the VM.
      - uses: actions/checkout@v4

      # 2. Install uv and a Python interpreter. enable-cache speeds up
      #    repeat runs by caching the resolved dependency downloads.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      # 3. Create the venv and install everything from uv.lock —
      #    the SAME pinned versions you have locally (reproducible build).
      - name: Install dependencies
        run: uv sync

      # 4. The four gates. Any non-zero exit fails the job (red X).
      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Tests
        run: uv run pytest
